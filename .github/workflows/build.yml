name: Build CompressPro Installer

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ─── 1. 下载 7z.dll ───
      - name: Download 7z.dll/7z.exe
        shell: pwsh
        run: |
          $ver = "2601"
          $url = "https://www.7-zip.org/a/7z$ver-extra.7z"
          $archive = "$env:TEMP\7z$ver-extra.7z"
          Invoke-WebRequest -Uri $url -OutFile $archive -UseBasicParsing
          & 7z x $archive -o"$env:TEMP\7z-extra" -y | Out-Null
          New-Item -ItemType Directory -Force -Path "external" | Out-Null
          $dll = Get-ChildItem "$env:TEMP\7z-extra" -Recurse -Include "7z.dll","7za.dll" | Select-Object -First 1
          $exe = Get-ChildItem "$env:TEMP\7z-extra" -Recurse -Include "7z.exe","7za.exe" | Select-Object -First 1
          if ($dll) { Copy-Item $dll.FullName "external\7z.dll" -Force }
          else { Write-Host "[ERROR] 7z.dll not found"; exit 1 }
          if ($exe) { Copy-Item $exe.FullName "external\7z.exe" -Force }

      # ─── 2. 自包含发布 (打包 .NET 运行时) ───
      - name: Publish self-contained
        shell: pwsh
        run: |
          dotnet restore
          dotnet publish src\CompressPro.Gui\CompressPro.Gui.csproj `
            -c Release -r win-x64 --self-contained -o publish-app
          Copy-Item "external\7z.dll" "publish-app\" -Force
          Copy-Item "external\7z.exe" "publish-app\" -Force
          $size = (Get-ChildItem "publish-app" -Recurse -File | Measure-Object -Property Length -Sum).Sum
          Write-Host "[OK] Self-contained app: $([math]::Round($size/1MB, 1)) MB"

      # ─── 3. 构建安装包 ───
      - name: Build installer
        shell: pwsh
        run: |
          choco install nsis -y --no-progress --limit-output 2>$null
          $env:Path += ";${env:ProgramFiles(x86)}\NSIS"
          makensis "installer\setup.nsi"
          if (Test-Path "installer\CompressPro_Setup.exe") {
              Copy-Item "installer\CompressPro_Setup.exe" "CompressPro_Setup.exe" -Force
              $size = (Get-Item "CompressPro_Setup.exe").Length
              Write-Host "[OK] Installer: $([math]::Round($size/1MB, 1)) MB"
          } else { Write-Host "[ERROR] Installer build failed"; exit 1 }

      # ─── 4. 上传安装包 ───
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: CompressPro_Setup
          path: CompressPro_Setup.exe
          retention-days: 90

      # ─── 5. 创建 Release ───
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: CompressPro v1.0.${{ github.run_number }}
          body: |
            🗜️ **CompressPro** - 轻量压缩解压工具

            下载 **CompressPro_Setup.exe** 双击安装，无需 .NET Runtime，无需 7-Zip。

            ## 特性
            - 自包含：内置 .NET 运行时 + 7-Zip 引擎
            - 右键菜单（安装时可勾选）
            - 文件格式关联（7z/zip/rar/tar/iso...）
            - AES-256 加密
            - 30+ 压缩格式
            - 控制面板卸载
          files: CompressPro_Setup.exe
          fail_on_unmatched_files: false
          generate_release_notes: false
          make_latest: true
